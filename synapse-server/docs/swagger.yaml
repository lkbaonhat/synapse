basePath: /api/v1
definitions:
  github_com_synapse_server_internal_domain.Card:
    properties:
      content:
        type: string
      createdAt:
        type: string
      deckID:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      dueAt:
        description: nil → card not yet studied (new)
        type: string
      easiness:
        description: SM-2 E-factor (default 2.5)
        format: float64
        type: number
      id:
        type: string
      interval:
        description: SRS scheduling fields (initialised on first study)
        type: integer
      repetitions:
        description: total successful reviews
        type: integer
      tags:
        items:
          $ref: '#/definitions/github_com_synapse_server_internal_domain.Tag'
        type: array
      type:
        $ref: '#/definitions/github_com_synapse_server_internal_domain.CardType'
      updatedAt:
        type: string
    type: object
  github_com_synapse_server_internal_domain.CardType:
    enum:
    - flashcard
    - cloze
    - free_response
    - multiple_choice
    type: string
    x-enum-varnames:
    - CardTypeFlashcard
    - CardTypeCloze
    - CardTypeFreeResponse
    - CardTypeMultipleChoice
  github_com_synapse_server_internal_domain.DailyActivity:
    description: A data-point representing learning activity for a specific day
    properties:
      count:
        description: cards reviewed that day
        type: integer
      date:
        description: '"YYYY-MM-DD"'
        type: string
    type: object
  github_com_synapse_server_internal_domain.Deck:
    properties:
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      description:
        type: string
      folderID:
        type: string
      id:
        type: string
      name:
        type: string
      tags:
        items:
          $ref: '#/definitions/github_com_synapse_server_internal_domain.Tag'
        type: array
      updatedAt:
        type: string
      userID:
        type: string
    type: object
  github_com_synapse_server_internal_domain.DeckStats:
    description: Breakdown of card mastery tiers for a specific deck
    properties:
      deckId:
        type: string
      learning:
        type: integer
      mastered:
        type: integer
      new:
        type: integer
      review:
        type: integer
    type: object
  github_com_synapse_server_internal_domain.Folder:
    properties:
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        type: string
      name:
        type: string
      parentID:
        type: string
      updatedAt:
        type: string
      userID:
        type: string
    type: object
  github_com_synapse_server_internal_domain.ForecastDay:
    description: Projected review workload for a future date
    properties:
      count:
        type: integer
      date:
        type: string
    type: object
  github_com_synapse_server_internal_domain.QuizResult:
    properties:
      totalCorrect:
        type: integer
      totalWrong:
        type: integer
      wrongAnswers:
        items:
          $ref: '#/definitions/github_com_synapse_server_internal_domain.WrongAnswerSummary'
        type: array
    type: object
  github_com_synapse_server_internal_domain.StatsOverview:
    description: Overall statistics for a user's library and study patterns
    properties:
      currentStreak:
        description: calendar days
        type: integer
      retentionRate:
        description: percentage
        type: number
      totalCards:
        type: integer
      totalStudied:
        type: integer
    type: object
  github_com_synapse_server_internal_domain.StudyMode:
    enum:
    - learn
    - review
    - cram
    - quiz
    type: string
    x-enum-varnames:
    - StudyModeLearn
    - StudyModeReview
    - StudyModeCram
    - StudyModeQuiz
  github_com_synapse_server_internal_domain.Tag:
    properties:
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        type: string
      name:
        type: string
      updatedAt:
        type: string
      userID:
        type: string
    type: object
  github_com_synapse_server_internal_domain.WrongAnswerSummary:
    properties:
      cardId:
        type: string
      correctBack:
        type: string
      front:
        type: string
    type: object
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  internal_handler.answerRequest:
    properties:
      cardId:
        type: string
      rating:
        maximum: 4
        minimum: 1
        type: integer
      timeTaken:
        minimum: 0
        type: integer
    required:
    - cardId
    - rating
    - timeTaken
    type: object
  internal_handler.attachTagsRequest:
    properties:
      tagIds:
        items:
          type: string
        type: array
    required:
    - tagIds
    type: object
  internal_handler.createCardRequest:
    properties:
      content:
        type: string
      type:
        $ref: '#/definitions/github_com_synapse_server_internal_domain.CardType'
    required:
    - content
    - type
    type: object
  internal_handler.createDeckRequest:
    properties:
      description:
        type: string
      folderId:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  internal_handler.createFolderRequest:
    properties:
      name:
        type: string
      parentId:
        type: string
    required:
    - name
    type: object
  internal_handler.createTagRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  internal_handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_handler.refreshRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  internal_handler.registerRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  internal_handler.startSessionRequest:
    properties:
      deckId:
        type: string
      mode:
        $ref: '#/definitions/github_com_synapse_server_internal_domain.StudyMode'
    required:
    - deckId
    - mode
    type: object
  internal_handler.updateFolderRequest:
    properties:
      name:
        type: string
      parentId:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Backend API for the Synapse Study Assistant.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Synapse API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login using email and password
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Authenticate and receive tokens
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh Token to invalidate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.refreshRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Invalidate the refresh token
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Exchange refresh token for a new token pair
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with email and password
      parameters:
      - description: Registration Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
      - Auth
  /cards/{id}:
